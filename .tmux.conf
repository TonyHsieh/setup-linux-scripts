##### Basics #####

## Remember to get the TPM - TMUX Plugin Manager ## 
##  git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

# Portable shell setup (macOS/CachyOS)
set -g default-shell /bin/bash
set -g default-command /bin/bash

# Override default shell with Homebrew bash on macOS if available
if-shell "[ -x /opt/homebrew/bin/bash ]" \
  "set -g default-shell /opt/homebrew/bin/bash; set -g default-command /opt/homebrew/bin/bash"


# Use 256 colors
set -g default-terminal "screen-256color"

# Faster command sequences
set -sg escape-time 0

# Enable mouse (scroll, resize, select panes)
set -g mouse on

# Vi-style keys in copy mode
set -g mode-keys vi

# Fix to the ctrl-b [ to always be in vi copy mode.
unbind [
bind [ copy-mode -e

# Explicit vi selection bindings (even if mode-keys flips)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line

# History buffer (scrollback)
set -g history-limit 100000

##### Prefix (optional but popular) #####
# Uncomment if you want Ctrl+a instead of Ctrl+b
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# Clipboard integration (portable across macOS and Linux X11/Wayland)
# Default fallback to xclip (X11 Linux)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# Override for Wayland Linux (CachyOS default)
if-shell "[ -n \"$WAYLAND_DISPLAY\" ]" \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"; \
   bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"'

# Override for macOS
if-shell "[ -x /usr/bin/pbcopy ]" \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"; \
   bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"'

# Override for WSL (Windows clipboard integration)
if-shell 'grep -qsi Microsoft /proc/version' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "/mnt/c/Windows/System32/clip.exe"; \
   bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "/mnt/c/Windows/System32/clip.exe"'

##### Pane navigation #####

# Vim-like pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Pane resizing #####

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Windows #####

# Start windows at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Automatically rename windows (useful for SSH)
set -g automatic-rename on
set -g allow-rename on

##### Status bar #####

set -g status-position bottom
set -g status-bg colour235
set -g status-fg colour136

set -g status-left "#[fg=colour40] #S "
set -g status-right "#[fg=colour244]%Y-%m-%d %H:%M "

##### Reload config #####
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Automatic restore on tmux start
set -g @continuum-restore 'on'

# ble.sh - user prompt cursor 
set -g cursor-style underline
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# Automatic TPM clone & permission fix if missing
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && chmod -R +x ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom)
run 'chmod -R +x ~/.tmux/plugins/tpm 2>/dev/null; ~/.tmux/plugins/tpm/tpm'

